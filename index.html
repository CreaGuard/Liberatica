  <style>
    :root {
      --accent-color: #C8A97E;
      --bg-color: linear-gradient(135deg, #161514, #0A0A0A);
      --text-color: #F0EFEA;
      --card-bg: #1C1B1A;
      --card-border: rgba(255, 255, 255, 0.05);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --search-bg: #1C1B1A;
      --search-text: #A09E9C;
      --category-bg: #1C1B1A;
      --category-text: #E0DFDB;
      --category-border: #33312E;
      --modal-bg: rgba(22, 21, 20, 0.85);
      --modal-input-bg: rgba(30, 29, 28, 0.6);
      --modal-input-border: rgba(255, 255, 255, 0.1);
      --category-modal-btn: rgba(40, 38, 36, 0.7);
      --tree-stroke: #C8A97E;
      --shimmer-bg: rgba(200, 169, 126, 0.1);
      --shimmer-gradient: linear-gradient(to right, rgba(200, 169, 126, 0.05) 0%, rgba(200, 169, 126, 0.15) 50%, rgba(200, 169, 126, 0.05) 100%);
      --fab-bg: rgba(30, 30, 30, 0.4);
      --fab-border: rgba(255, 255, 255, 0.08);
    }

    * { -webkit-tap-highlight-color: transparent; }
    ::selection { background: var(--accent-color); color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--category-border); border-radius: 10px; transition: background 0.3s; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }

    html { scroll-behavior: smooth; }
    body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg-color); color: var(--text-color); font-family: 'Inter', 'Manrope', sans-serif; padding: 40px 24px; transition: background 0.5s ease, color 0.5s ease; }
    .container { max-width: 1600px; margin: 0 auto; }
    
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-family: 'Manrope', sans-serif; font-weight: 400; font-size: 44px; letter-spacing: 18px; text-transform: uppercase; color: var(--text-color); margin: 0 -18px 0 0; opacity: 0; transform: translateY(-20px); animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; transition: opacity 0.3s; }
    .header h1:hover { opacity: 0.7; }
    .header .site-subtitle { font-weight: 400; font-family: 'Manrope', sans-serif; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-top: 16px; margin-bottom: 0; color: var(--accent-color); opacity: 0.9; }
    
    #featured-book { background: var(--card-bg); border-radius: 20px; padding: 32px; margin-bottom: 40px; display: none; gap: 40px; align-items: center; box-shadow: 0 10px 40px var(--shadow-color); border: 1px solid var(--card-border); }
    #featured-book.visible { display: flex; }
    #featured-book img { max-width: 180px; border-radius: 8px; box-shadow: 0 8px 24px var(--shadow-color); flex-shrink: 0; }
    #featured-book .featured-content { flex: 1; }
    #featured-book .spotlight-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent-color); margin-bottom: 12px; font-weight: 600; display: inline-block; border-bottom: 1px solid var(--accent-color); padding-bottom: 4px; }
    #featured-book h2 { font-family: 'DM Serif Display', serif; font-size: 32px; margin: 0 0 8px; color: var(--text-color); }
    #featured-book .author { font-size: 16px; letter-spacing: 1px; color: var(--text-color); opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; }
    #featured-book .featured-quote { font-style: italic; color: var(--text-color); opacity: 0.85; margin: 0 0 24px 0; padding-left: 20px; border-left: 3px solid var(--accent-color); font-size: 15px; line-height: 1.6; }
    #featured-book .buttons { margin-top: 24px; display: flex; gap: 16px; }
    #featured-book .buttons a { display: inline-flex; align-items: center; justify-content: center; padding: 14px 28px; border-radius: 12px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; font-weight: 500; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    #featured-book a.read { background: var(--accent-color); color: #fff; }
    #featured-book a.read:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(200, 169, 126, 0.3); }
    #featured-book a.download { background: transparent; border: 1px solid var(--text-color); color: var(--text-color); }
    #featured-book a.download:hover { background: var(--text-color); color: var(--card-bg); }

    .controls { max-width: 800px; width: 100%; margin: 0 auto 32px; display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center; }
    
    /* --- Modern Google-style Search Bar & Dropdown --- */
    .search-wrapper { position: relative; flex: 1; min-width: 200px; display: flex; }
    .search-trigger { width: 100%; box-sizing: border-box; padding: 0 24px; height: 52px; line-height: 52px; font-family: 'Manrope', sans-serif; font-size: 15px; letter-spacing: 0.5px; border-radius: 16px; border: 1px solid var(--card-border); box-shadow: 0 4px 16px var(--shadow-color); background: var(--search-bg); color: var(--text-color); outline: none; transition: all 0.3s; }
    .search-trigger::placeholder { color: var(--search-text); font-family: 'Manrope', sans-serif; font-size: 15px; }
    .search-trigger:hover, .search-trigger:focus { box-shadow: 0 8px 24px var(--shadow-color); border-color: var(--accent-color); }
    
    .search-dropdown { position: absolute; top: calc(100% + 8px); left: 0; width: 100%; box-sizing: border-box; background: var(--modal-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 350px; overflow-y: auto; z-index: 100; list-style: none; margin: 0; padding: 12px; display: none; }
    .search-dropdown.visible { display: block; animation: fadeIn 0.2s ease-out; }
    .search-dropdown::-webkit-scrollbar { width: 6px; }
    .search-dropdown::-webkit-scrollbar-track { background: transparent; }
    .search-dropdown::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }

    #category-btn-mobile, #requestBookBtn { border-radius: 16px; border: 1px solid var(--card-border); box-shadow: 0 4px 16px var(--shadow-color); cursor: pointer; transition: all 0.3s; }
    #category-btn-mobile:hover { box-shadow: 0 8px 24px var(--shadow-color); border-color: var(--accent-color); }
    #category-btn-mobile { display: flex; align-items: center; justify-content: center; background: var(--search-bg); width: 52px; height: 52px; flex-shrink: 0; }
    #category-btn-mobile svg { stroke: var(--text-color); fill: none; width: 22px; height: 22px; }
    
    #requestBookBtn { background: var(--search-bg); color: var(--text-color); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--card-border); }
    #requestBookBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow-color); }

    /* --- DEDICATED CONTINUE READING SECTION (Glass Mosaic Redesign) --- */
    #recent-read-section {
        display: none;
        max-width: 800px;
        width: 100%;
        box-sizing: border-box;
        margin: 0 auto 40px auto;
        animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .recent-read-card {
        border-radius: 20px;
        padding: 28px 24px 20px 24px;
        display: flex;
        gap: 20px;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
        cursor: pointer;
        transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
        /* Glass Mosaic Aesthetic Base (Dark Mode) */
        background-color: rgba(20, 20, 20, 0.4);
        background-image: 
            linear-gradient(120deg, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0.2) 100%),
            radial-gradient(circle at 0% 0%, rgba(200, 169, 126, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 100% 100%, rgba(200, 169, 126, 0.1) 0%, transparent 40%),
            url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.08"/></svg>');
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .recent-read-card:hover {
        transform: translateY(-4px) scale(1.01);
        background-color: rgba(30, 30, 30, 0.5);
        box-shadow: 
            0 30px 60px rgba(0, 0, 0, 0.5),
            inset 0 0 0 1px rgba(255, 255, 255, 0.15),
            inset 0 0 20px rgba(200, 169, 126, 0.25),
            0 0 40px rgba(200, 169, 126, 0.3);
    }

    .recent-cover-img {
        width: 56px;
        height: auto;
        max-height: 90px;
        border-radius: 8px;
        object-fit: cover;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        background-color: transparent;
        flex-shrink: 0;
        transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .recent-read-card:hover .recent-cover-img {
        transform: scale(1.08) rotate(-3deg);
    }

    .recent-card-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0; /* allows flex items to shrink below minimum content size */
        container-type: inline-size;
    }

    .resume-label {
        position: absolute;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Manrope', sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 4px;
        color: var(--accent-color);
        margin: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0.8;
        white-space: nowrap;
    }

    .resume-label::before,
    .resume-label::after {
        content: '';
        width: 30px;
        height: 1px;
        background: currentColor;
        opacity: 0.4;
        transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
    }

    .recent-read-card:hover .resume-label::before,
    .recent-read-card:hover .resume-label::after {
        width: 50px;
        opacity: 0.8;
    }

    /* Single Line Adaptive Title - Smart Scaling Ready */
    .recent-card-title {
        font-family: 'Manrope', sans-serif;
        font-size: 22px;
        font-weight: 600;
        color: var(--text-color);
        line-height: 1.2;
        margin: 0;
        white-space: nowrap;
        overflow: hidden;
        /* text-overflow: ellipsis; Removed to let JS handle scale without dots */
        width: 100%;
        letter-spacing: 0.2px;
    }

    /* Out of the box Immersion Status */
    .immersion-status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 6px;
        min-width: 0;
    }

    .eq-bar-container {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 10px;
        flex-shrink: 0;
    }

    .eq-bar {
        width: 3px;
        height: 100%;
        background-color: var(--accent-color);
        border-radius: 2px;
        transform-origin: bottom;
        animation: eq-bounce 0.8s infinite alternate ease-in-out;
    }

    .eq-bar:nth-child(1) { transform: scaleY(0.4); animation-delay: 0.1s; }
    .eq-bar:nth-child(2) { transform: scaleY(0.8); animation-delay: 0.3s; }
    .eq-bar:nth-child(3) { transform: scaleY(0.5); animation-delay: 0.0s; }
    .eq-bar:nth-child(4) { transform: scaleY(0.9); animation-delay: 0.4s; }

    @keyframes eq-bounce {
        0% { transform: scaleY(0.2); }
        100% { transform: scaleY(1); }
    }

    .immersion-text {
        font-family: 'Manrope', sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        color: var(--text-color);
        opacity: 0.6;
        text-transform: uppercase;
        transition: opacity 0.4s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
    }
    
    .immersion-text.fade-out {
        opacity: 0 !important;
    }

    /* Circular Outline Play Button */
    .resume-play-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 1.5px solid var(--accent-color);
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        margin-left: auto;
    }

    .resume-play-btn svg {
        width: 20px;
        height: 20px;
        fill: var(--accent-color);
        margin-left: 3px; /* Optically center the play triangle */
        transition: all 0.4s ease;
    }

    .recent-read-card:hover .resume-play-btn {
        background: rgba(200, 169, 126, 0.1);
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(200, 169, 126, 0.2);
    }

    @media (max-width: 768px) {
        #recent-read-section { margin-bottom: 32px; padding: 0; }
        .controls { flex-wrap: nowrap; gap: 12px; }
        .recent-read-card { padding: 24px 16px 16px 16px; gap: 12px; border-radius: 16px; }
        .recent-cover-img { width: 48px; height: auto; max-height: 76px; }
        .resume-label { font-size: 9px; letter-spacing: 2px; top: 10px; gap: 8px; }
        .resume-label::before, .resume-label::after { width: 16px; }
        .recent-read-card:hover .resume-label::before,
        .recent-read-card:hover .resume-label::after { width: 24px; }
        .recent-card-title { font-size: 18px; }
        .immersion-text { font-size: 9px; letter-spacing: 1px; }
        .resume-play-btn { width: 44px; height: 44px; border-width: 1px; }
        .resume-play-btn svg { width: 16px; height: 16px; margin-left: 2px; }
    }

    .category-tags { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 0 auto 40px; max-width: 900px; }
    .category-tag { padding: 10px 20px; border-radius: 30px; border: 1px solid var(--category-border); background: var(--category-bg); color: var(--category-text); cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); font-family: 'Manrope', sans-serif; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
    .category-tag:hover { border-color: var(--accent-color); color: var(--text-color); }
    .category-tag.active { background: var(--accent-color); color: white; border-color: var(--accent-color); box-shadow: 0 4px 12px rgba(200, 169, 126, 0.3); }
    
    .book-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 32px; }
    .book-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 24px var(--shadow-color); border: 1px solid var(--card-border); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease-out; opacity: 0; transform: translateY(40px); display: flex; flex-direction: column; height: 100%; position: relative; cursor: pointer; }
    .book-card.is-visible { opacity: 1; transform: translateY(0); }
    .book-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px var(--shadow-color); border-color: var(--accent-color); }
    .book-card::after { content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%; background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%); transform: skewX(-25deg); transition: left 0.7s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; z-index: 10; }
    body.dark-mode .book-card::after { background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%); }
    .book-card:hover::after { left: 150%; }
    .book-card img { height: 320px; object-fit: contain; width: 100%; background-color: transparent; padding-top: 16px; transition: transform 0.5s ease; }
    
    .book-content { padding: 24px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; position: relative; z-index: 2; }
    .book-content h3 { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.3; margin: 0 0 8px; color: var(--text-color); }
    .book-content .author { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-color); opacity: 0.6; margin-bottom: 8px; }
    .book-content .category { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-color); margin-bottom: 16px; }
    .book-content .buttons { display: flex; justify-content: center; gap: 12px; margin-top: auto; }
    .book-content a { flex: 1; padding: 12px 0; border-radius: 12px; text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; font-family: 'Manrope', sans-serif; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; }
    .book-content a.read { background: var(--accent-color); color: white; }
    .book-content a.read:hover { box-shadow: 0 4px 12px rgba(200, 169, 126, 0.4); }
    .book-content a.download { background: transparent; border: 1px solid var(--text-color); color: var(--text-color); }
    .book-content a.download:hover { background: var(--text-color); color: var(--card-bg); }

    .load-more-container { grid-column: 1 / -1; text-align: center; margin-top: 48px; display: none; }
    #load-more-btn { background: transparent; color: var(--text-color); border: 1px solid var(--text-color); padding: 16px 40px; border-radius: 30px; font-family: 'Manrope', sans-serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    #load-more-btn:hover { background: var(--text-color); color: var(--card-bg); transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow-color); }
    .footer { text-align: center; margin-top: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .footer p { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-color); opacity: 0.5; margin: 0; }
    
    #footer-back-to-top { background: transparent; border: none; color: var(--accent-color); font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 24px; transition: opacity 0.3s; }
    #footer-back-to-top:hover { opacity: 0.7; }
    
    .book-card.is-loading { cursor: default; border-color: var(--card-border); }

      <button id="requestBookBtn" title="Request a Book" aria-label="Request a Book"><svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><use href="#icon-request"/></svg><span>Request</span></button>
    </div>

    <!-- DEDICATED CONTINUE READING SECTION -->
    <div id="recent-read-section">
      <div id="recent-read-card" class="recent-read-card" title="Resume reading">
        <img src="" id="recent-cover" class="recent-cover-img" alt="Recent Book Cover">
        <div class="recent-card-info">
            <span class="resume-label">CONTINUE READING</span>
            <h3 id="recent-title" class="recent-card-title">...</h3>
            <div class="immersion-status">
                <div class="eq-bar-container">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                </div>
                <span class="immersion-text" id="immersion-dynamic-text">Loading...</span>
            </div>
        </div>
        <button class="resume-play-btn" aria-label="Resume Reading">
            <svg viewBox="0 0 20 20"><path d="M6 4L15 10L6 16V4Z" /></svg>

    <div class="load-more-container"><button id="load-more-btn">Load More Books</button></div>

        <button id="footer-back-to-top" title="Scroll to Top">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><use href="#icon-up"/></svg>
            BACK TO TOP
        </button>
        <p>© 2025 Liberatica. All rights reserved.</p>
    </div>
  </div>

  <!-- Modals -->
  <div class="palette-overlay modal-overlay" id="palette-overlay">
    <div class="command-palette">
        <button class="modal-close-btn" aria-label="Close Modal">&times;</button>
        <div class="palette-content">
            <div class="palette-detail-view"></div>
        </div>
    </div>
  </div>

  <div class="modal-overlay" id="request-modal">
    <div class="modal-content">
      <button class="modal-close-btn" aria-label="Close Modal">&times;</button>
      <h2>Request a Book</h2>
      <form action="https://formspree.io/f/xjkoopzp" method="POST">
        <input type="text" name="Book Title" placeholder="Book title (required)" required>
        <input type="text" name="Author" placeholder="Author (required)" required>
        <input type="text" name="Name" placeholder="Your name (required)" required>
        <input type="email" name="Email" placeholder="Your email (optional)">
        <textarea name="Message" rows="4" placeholder="Why are you requesting it? (optional)"></textarea>
        <button type="submit" style="background:var(--accent-color); color:white; border:none; padding:12px 24px; border-radius:8px; width:100%; cursor:pointer; font-size:16px;">Submit Request</button>
      </form>

  <div class="modal-overlay" id="category-modal">
    <div class="modal-content">
      <button class="modal-close-btn" aria-label="Close Modal">&times;</button>
      <h2>Categories</h2>
      <div id="category-modal-list"></div>
    </div>
  </div>

  <script>
    
    // AUTH GUARD — must be logged in to see this page
(function() {
  if (localStorage.getItem('liberatica_access') !== 'granted') {
    window.location.replace('/login.html');
  }
})();

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.querySelector('.container'), bookGrid = document.getElementById('book-grid');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const searchInput = document.getElementById('search-trigger'), searchDropdown = document.getElementById('search-dropdown');
        const paletteOverlay = document.getElementById('palette-overlay'), paletteDetailView = paletteOverlay.querySelector('.palette-detail-view');
        const categoryTagsContainer = document.getElementById('category-tags'), categoryModalList = document.getElementById('category-modal-list');
        const loaderOverlay = document.getElementById('loader-overlay');

        let allBooks = [], currentRenderedBooks = [], booksDisplayed = 0;
        const BOOKS_PER_BATCH = 24;
        const RECENT_BOOK_KEY = 'liberatica_recent_v3';
        const RECENT_TIME_KEY = 'liberatica_recent_time_v3';

        // --- CONTINUE READING LOGIC ---
        window.saveRecentRead = (id) => {
            localStorage.setItem(RECENT_BOOK_KEY, id);
            localStorage.setItem(RECENT_TIME_KEY, Date.now());
            const book = allBooks.find(b => b.id == id);
            if (book) showRecentRead(book);
        };

        function showRecentRead(book) {
            const section = document.getElementById('recent-read-section');
            const card = document.getElementById('recent-read-card');
            const cover = document.getElementById('recent-cover');
            const title = document.getElementById('recent-title');

            if (!section || !card || !cover || !title) return;

            // Setup Text Cycling Logic
            const immersionStatuses = ["Left Unfinished", "Still Waiting", "Not Finished", "Pick Up", "Continue Now", "Resume Story", "Come Back"];
            const randStatus = immersionStatuses[Math.floor(Math.random() * immersionStatuses.length)];
            const textElement = document.getElementById('immersion-dynamic-text');
            if (textElement) {
                textElement.textContent = randStatus;

                const getTimeAgoString = () => {
                    let savedTime = localStorage.getItem(RECENT_TIME_KEY);
                    // Backfill for older saved sessions that don't have a time attached
                    if (!savedTime) {
                        savedTime = Date.now().toString();
                        localStorage.setItem(RECENT_TIME_KEY, savedTime);
                    }
                    const diffMins = Math.floor((Date.now() - parseInt(savedTime, 10)) / 60000);
                    if (diffMins < 1) return "Last read just now";
                    if (diffMins < 60) return `Last read ${diffMins} min${diffMins > 1 ? 's' : ''} ago`;
                    const diffHrs = Math.floor(diffMins / 60);
                    if (diffHrs < 24) return `Last read ${diffHrs} hr${diffHrs > 1 ? 's' : ''} ago`;
                    const diffDays = Math.floor(diffHrs / 24);
                    return `Last read ${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
                };

                if (window.immersionCycleId) clearInterval(window.immersionCycleId);
                let showingTime = false;
                window.immersionCycleId = setInterval(() => {
                    textElement.classList.add('fade-out');
                    setTimeout(() => {
                        showingTime = !showingTime;
                        textElement.textContent = showingTime ? getTimeAgoString() : randStatus;
                        textElement.classList.remove('fade-out');
                    }, 400); 
                }, 5000);
            }

            cover.src = book.Cover_url;
            title.textContent = book.Title;
            section.style.display = 'block';
            
            // --- SMART SINGLE-LINE TITLE SCALING ALGORITHM FOR RECENT READ ---
            requestAnimationFrame(() => {
                let currentFontSize = window.innerWidth <= 768 ? 18 : 22;
                title.style.fontSize = currentFontSize + 'px';
                
                // Keep shrinking the font size by 0.5px until the entire text fits flawlessly inside its bounded width
                while (title.scrollWidth > title.clientWidth && currentFontSize > 10) {
                    currentFontSize -= 0.5;
                    title.style.fontSize = currentFontSize + 'px';
                }
            });
            
            card.onclick = () => {
                saveRecentRead(book.id);
                window.location.href = `/reader.html?book=${encodeURIComponent(book.pdf_url)}&title=${encodeURIComponent(book.Title)}`;
            };
        }

        function checkRecentProgress() {
            const lastId = localStorage.getItem(RECENT_BOOK_KEY);
            if (lastId !== null && allBooks.length > 0) {
                const book = allBooks.find(b => b.id == lastId);
                if (book) showRecentRead(book);
            }
        }

        // --- SMART SEARCH ALGORITHMS ---
        const normalizeStr = str => str ? str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().replace(/\s+/g, ' ') : '';

        const getEditDistance = (a, b) => {
            if(a.length === 0) return b.length;
            if(b.length === 0) return a.length;
            const matrix = Array.from({ length: a.length + 1 }, () => new Array(b.length + 1).fill(0));
            for(let i = 0; i <= a.length; i++) matrix[i][0] = i;
            for(let j = 0; j <= b.length; j++) matrix[0][j] = j;
            for(let i = 1; i <= a.length; i++){
                for(let j = 1; j <= b.length; j++){
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    matrix[i][j] = Math.min(matrix[i - 1][j] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j - 1] + cost);
                }
            }
            return matrix[a.length][b.length];
        };

        const performSmartSearch = (rawTerm) => {
    const term = normalizeStr(rawTerm);

    if (!term) return [];

    const searchWords = term.split(' ');

    const results = allBooks.map(book => {

        const title = normalizeStr(book.Title || '');
        const author = normalizeStr(book.Author || '');

        let score = 0;

        // EXACT TITLE
        if (title === term)
            score += 2000;

        // TITLE STARTS WITH SEARCH
        else if (title.startsWith(term))
            score += 1000;

        // TITLE CONTAINS SEARCH
        else if (title.includes(term))
            score += 500;

        // AUTHOR EXACT
        if (author === term)
            score += 1200;

        // AUTHOR CONTAINS
        else if (author.includes(term))
            score += 700;

        const words = (title + ' ' + author).split(' ');

        let matchedWords = 0;

        searchWords.forEach(sw => {

            let found = false;

            // Exact word
            for (const tw of words) {

                if (tw === sw) {
                    score += 150;
                    found = true;
                    break;
                }
            }

            if (found) {
                matchedWords++;
                return;
            }

            // Skip fuzzy on short words
            if (sw.length <= 3)
                return;

            for (const tw of words) {

                if (Math.abs(tw.length - sw.length) > 1)
                    continue;

                const dist = getEditDistance(sw, tw);

                if (dist === 1) {
                    score += 30;
                    found = true;
                    break;
                }
            }

            if (found)
                matchedWords++;
        });

        if (matchedWords === 0 && score === 0)
            return null;

        return { book, score };
    });
return results
            .filter(Boolean)
            .sort((a, b) => b.score - a.score)
            .map(r => r.book);
    };

        // --- STRICT SMART RECOMMENDATION ALGORITHM ---
        const getTags = (book) => {
            const rawTags = book.tags || book.Tags;
            if (!rawTags) return [];
            let tagsString = Array.isArray(rawTags) ? rawTags.join(',') : String(rawTags);
            tagsString = tagsString.replace(/\u00A0/g, ' ').toLowerCase();
            return tagsString.split(/[\s,]+/).filter(Boolean);
        };

        const getSmartRecommendations = (selectedBook, allBooks) => {
            const selectedCategory = selectedBook.Category || '';
            const selectedTags = getTags(selectedBook);
            const scoredBooks = [];
            for (const book of allBooks) {
                if (book.id === selectedBook.id) continue;
                let score = 0;
                const bookTags = getTags(book);
                let tagMatches = 0;
                for (const sTag of selectedTags) { if (bookTags.includes(sTag)) tagMatches++; }
                if (tagMatches >= 2) score += 6; else if (tagMatches === 1) score += 3;
                if (book.Category === selectedCategory && selectedCategory !== '') { score += 1; }
                if (tagMatches > 0) { scoredBooks.push({ book, score }); }
            }
            scoredBooks.sort((a, b) => b.score - a.score);
            return scoredBooks.map(item => item.book).slice(0, 6);
        };

        // --- SESSION BASED LOADER ---
        let animationPromise = Promise.resolve();
        if (sessionStorage.getItem('liberatica_loader_played')) {
            loaderOverlay.style.display = 'none'; container.style.display = 'block';
        } else {
            setTimeout(() => loaderOverlay.classList.add('active'), 100);
            sessionStorage.setItem('liberatica_loader_played', 'true');
            animationPromise = new Promise(res => setTimeout(res, 2000));
        }

        // --- MODALS & SHORTCUTS ---
        const bindModal = (btnId, modalId) => document.getElementById(btnId).onclick = () => document.getElementById(modalId).classList.add('visible');
        bindModal('requestBookBtn', 'request-modal');
        bindModal('category-btn-mobile', 'category-modal');
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.onclick = e => {
                if(e.target === m || e.target.classList.contains('modal-close-btn')) {
                    m.classList.remove('visible');
                    if (m.id === 'palette-overlay') { document.getElementById('dynamic-title').textContent = "Liberatica – Free Digital Library | Philosophy, Filmmaking, Design, Business & Request Books"; try { window.history.replaceState({}, '', '/'); } catch(e) {} }
                }
            };
        });
        document.addEventListener('keydown', e => { 
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('visible'));
                searchDropdown.classList.remove('visible');
            } 
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); searchInput.focus(); }
        });

        // --- FETCH & INIT ---
        const fetchCache = async (url, key) => {
            if (sessionStorage.getItem(key)) return JSON.parse(sessionStorage.getItem(key));
            const data = await (await fetch(url)).json();
            try { sessionStorage.setItem(key, JSON.stringify(data)); } catch(e) {} return data;
        };

        Promise.all([
            fetchCache('https://opensheet.elk.sh/1QMyuVymXYTTgjaM_VQul_3BlrnRaDEaXj6EL6QgDE8k/WISDOME%20DATA%20BASE', 'lib_main'),
            fetchCache('https://opensheet.elk.sh/1QMyuVymXYTTgjaM_VQul_3BlrnRaDEaXj6EL6QgDE8k/SPOTLIGHT', 'lib_spot')
        ]).then(async ([originalBooks, spotlightBooks]) => {
            allBooks = (originalBooks || []).map((b, i) => ({ ...b, id: i }));
            if (spotlightBooks?.length) {
                const fb = spotlightBooks[Math.floor(Math.random() * spotlightBooks.length)];
                const fb_id = allBooks.find(b => b.Title === fb.Title)?.id || 0;
                const featDiv = document.getElementById('featured-book');
                featDiv.innerHTML = `<img src="${fb.Cover_url}" alt="${fb.Title}" onerror="this.src='https://placehold.co/150x200/f5f4f0/4b4a47?text=Cover';"><div class="featured-content"><div class="spotlight-label">Library Spotlight</div><h2>${fb.Title}</h2><p class="author">by ${fb.Author}</p>${fb.Featured_Quote || fb.Quote ? `<div class="featured-quote">"${fb.Featured_Quote || fb.Quote}"</div>` : ''}<div class="buttons"><a href="/reader.html?book=${encodeURIComponent(fb.pdf_url)}&title=${encodeURIComponent(fb.Title)}" onclick="saveRecentRead(${fb_id})" class="read">Read</a><a href="${fb.epub_url}" download class="download">Download</a></div></div>`;
                featDiv.classList.add('visible');
            }
            let randBooks = [...allBooks];
            for (let i = randBooks.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [randBooks[i], randBooks[j]] = [randBooks[j], randBooks[i]]; }
            await animationPromise;
            loaderOverlay.classList.add('hidden');
            container.style.display = 'block';
            setupFilters(allBooks, randBooks);
            renderBooks(randBooks);
            checkRecentProgress();
            const pathId = window.location.pathname.split('/')[2];
            if (pathId) { const b = allBooks.find(x => x.id == pathId); if(b) { renderPaletteDetail(b); }}
        });

        // --- RENDER LOGIC ---
        function renderBooks(list, append = false) {
            if (!append) { bookGrid.innerHTML = ''; booksDisplayed = 0; currentRenderedBooks = list; }
            if (!currentRenderedBooks.length) return bookGrid.innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: var(--text-color); opacity: 0.6; font-family: 'DM Serif Display', serif; font-size: 20px;">No books found in this wing.</p>`, loadMoreBtn.parentElement.style.display = 'none';
            const batch = currentRenderedBooks.slice(booksDisplayed, booksDisplayed + BOOKS_PER_BATCH);
            batch.forEach(b => {
                const card = document.createElement('div'); card.className = 'book-card'; card.dataset.title = b.Title;
                card.innerHTML = `<img src="${b.Cover_url}" alt="${b.Title}" loading="lazy" onerror="this.src='https://placehold.co/250x300/f5f4f0/4b4a47?text=Cover';"><div class="book-content"><div><h3>${b.Title}</h3><p class="author">${b.Author}</p><p class="category">${b.Category}</p></div><div class="buttons"><a href="/reader.html?book=${encodeURIComponent(b.pdf_url)}&title=${encodeURIComponent(b.Title)}" onclick="saveRecentRead(${b.id})" class="read" aria-label="Read Online" title="Read Online">Read</a><a href="${b.epub_url}" download class="download" aria-label="Download EPUB" title="Download EPUB">Download</a></div></div>`;
                bookGrid.appendChild(card); new IntersectionObserver(e => e.forEach(en => { if(en.isIntersecting) { en.target.classList.add('is-visible'); }})).observe(card);
            });
            booksDisplayed += batch.length;
            loadMoreBtn.parentElement.style.display = booksDisplayed < currentRenderedBooks.length ? 'block' : 'none';
        }
        loadMoreBtn.onclick = () => renderBooks(currentRenderedBooks, true);

        function setupFilters(books, randomBooks) {
            const tagsHTML = ['All Categories', ...new Set(books.map(b => b.Category))].map(c => `<button class="category-tag ${c === 'All Categories' ? 'active' : ''}" data-cat="${c === 'All Categories' ? 'all' : c}">${c}</button>`).join('');
            categoryTagsContainer.innerHTML = categoryModalList.innerHTML = tagsHTML;
            const handleFilter = e => {
                if(e.target.tagName !== 'BUTTON') return;
                const cat = e.target.dataset.cat;
                document.querySelectorAll('.category-tag').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
                bookGrid.innerHTML = Array.from({length: Math.min(12, BOOKS_PER_BATCH)}, () => `<div class="book-card is-loading"><div class="skeleton image-placeholder"></div><div class="book-content"><div class="skeleton title-placeholder"></div><div class="skeleton author-placeholder"></div></div></div>`).join('');
                setTimeout(() => { renderBooks(cat === 'all' ? randomBooks : books.filter(b => b.Category === cat)); }, 300);
                document.getElementById('category-modal').classList.remove('visible');
            };
            categoryTagsContainer.onclick = handleFilter; categoryModalList.onclick = handleFilter;
        }

        // --- SEARCH & DROPDOWN LOGIC ---
        searchInput.addEventListener('input', () => {
            const rawTerm = searchInput.value;
            if (!rawTerm.trim()) { searchDropdown.classList.remove('visible'); searchDropdown.innerHTML = ''; return; }
            const matches = performSmartSearch(rawTerm);
            searchDropdown.classList.add('visible');
            if (matches.length === 0) { searchDropdown.innerHTML = `<li style="padding: 20px; text-align:center; color: var(--text-color); opacity: 0.6;">No books found.</li>`; return; }
            searchDropdown.innerHTML = matches.map(b => `
                <li class="palette-result-item" data-id="${b.id}">
                    <img src="${b.Cover_url}" alt="${b.Title}">
                    <div>
                        <div class="title">${b.Title}</div>
                        <div class="author">${b.Author}</div>
                    </div>
                </li>
            `).join('');
        });
        document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrapper')) { searchDropdown.classList.remove('visible'); } });
        searchInput.addEventListener('focus', () => { if (searchInput.value && searchDropdown.innerHTML !== '') { searchDropdown.classList.add('visible'); } });
        searchDropdown.addEventListener('click', (e) => {
            const item = e.target.closest('.palette-result-item');
            if (item) {
                const book = allBooks.find(b => b.id == item.dataset.id);
                if (book) { searchDropdown.classList.remove('visible'); searchInput.value = ''; renderPaletteDetail(book); }
            }
        });

        bookGrid.onclick = e => { const card = e.target.closest('.book-card'); if(card && !card.classList.contains('is-loading')) { renderPaletteDetail(allBooks.find(b => b.Title === card.dataset.title)); } };

        function renderPaletteDetail(b) {
            paletteOverlay.classList.add('visible');
            document.getElementById('dynamic-title').textContent = `${b.Title} by ${b.Author} | Liberatica`; try { window.history.replaceState({}, '', `/book/${b.id}`); } catch(e){}
            const sUrl = window.location.href, sTxt = `Check out ${b.Title} by ${b.Author} on Liberatica`;
            paletteDetailView.innerHTML = `
                <div class="palette-detail-top">
                    <img src="${b.Cover_url}" class="palette-detail-cover">
                    <div class="palette-detail-info">
                        <h2 id="smart-title">${b.Title}</h2>
                        <p>by ${b.Author}</p>
                        <div class="actions-wrapper">
                            <div class="buttons">
                                <a href="/reader.html?book=${encodeURIComponent(b.pdf_url)}&title=${encodeURIComponent(b.Title)}" onclick="saveRecentRead(${b.id})" class="read" aria-label="Read Online" title="Read Online">Read</a>
                                <a href="${b.epub_url}" download class="download" aria-label="Download EPUB" title="Download EPUB">Download</a>
                                <button class="share-btn-main" aria-label="Share">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><use href="#icon-share"/></svg> Share
                                </button>
                                <button class="ai-teaser-btn">Teaser</button>
                            </div>
                            <div class="share-popup">
                                <button class="share-btn" data-p="twitter" title="Share on X" aria-label="Share on X"><svg viewBox="0 0 24 24"><use href="#icon-twitter"/></svg></button>
                                <button class="share-btn" data-p="facebook" title="Share on Facebook" aria-label="Share on Facebook"><svg viewBox="0 0 24 24"><use href="#icon-facebook"/></svg></button>
                                <button class="share-btn" data-p="whatsapp" title="Share on WhatsApp" aria-label="Share on WhatsApp"><svg viewBox="0 0 24 24"><use href="#icon-whatsapp"/></svg></button>
                                <button class="share-btn" data-p="copy" title="Copy Link" aria-label="Copy Link"><svg viewBox="0 0 24 24"><use href="#icon-copy"/></svg></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="palette-teaser-container" style="display:none; width: 100%; box-sizing: border-box;"></div>
                <div class="related-books" id="related-books-container" style="width: 100%; box-sizing: border-box;"></div>`;

            // --- SMART SINGLE-LINE TITLE SCALING ALGORITHM ---
            const titleEl = paletteDetailView.querySelector('#smart-title');
            const containerEl = paletteDetailView.querySelector('.palette-detail-info');
            if (titleEl && containerEl) {
                let currentFontSize = window.innerWidth <= 768 ? 24 : 32;
                titleEl.style.fontSize = currentFontSize + 'px';
                
                // Keep shrinking the font size by 0.5px until the entire text fits flawlessly inside the container
                while (titleEl.scrollWidth > containerEl.clientWidth && currentFontSize > 11) {
                    currentFontSize -= 0.5;
                    titleEl.style.fontSize = currentFontSize + 'px';
                }
            }

            const popup = paletteDetailView.querySelector('.share-popup');
            paletteDetailView.querySelector('.share-btn-main').onclick = e => { e.stopPropagation(); navigator.share ? navigator.share({title: sTxt, url: sUrl}).catch(()=>{}) : popup.classList.toggle('visible'); };
            popup.onclick = e => {
                const btn = e.target.closest('.share-btn'); if(!btn) return;
                const p = btn.dataset.p, encTxt = encodeURIComponent(sTxt), encUrl = encodeURIComponent(sUrl);
                const urls = { twitter: `https://twitter.com/intent/tweet?text=${encTxt}&url=${encUrl}`, facebook: `https://www.facebook.com/sharer/sharer.php?u=${encUrl}`, whatsapp: `https://api.whatsapp.com/send?text=${encodeURIComponent(sTxt + ' ' + sUrl)}` };
                if (urls[p]) window.open(urls[p], '_blank');
                else if (p === 'copy') { const ta = document.createElement("textarea"); ta.value = `${sTxt} ${sUrl}`; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(err){} ta.remove(); }
            };
            const tBtn = paletteDetailView.querySelector('.ai-teaser-btn'), tCont = paletteDetailView.querySelector('.palette-teaser-container');
            tBtn.onclick = async () => {
                tBtn.disabled = true; tCont.style.display = 'block'; tCont.classList.add('loading');
                tCont.innerHTML = `<div class="loading-shimmer-container"><div class="loading-bar long"></div><div class="loading-bar medium"></div><div class="loading-bar short"></div></div>`;
                await new Promise(r => setTimeout(r, 800));
                tCont.classList.remove('loading'); tBtn.disabled = false; tCont.innerHTML = '';
                const msg = b.trailer || b.Trailer || 'Sorry, a teaser could not be generated at this time.';
                msg.split(/(\s+)/).forEach((t, i) => {
                    if (/\s+/.test(t)) tCont.appendChild(document.createTextNode(t));
                    else { const s = document.createElement('span'); s.textContent = t; s.className = 'reveal-word'; tCont.appendChild(s); setTimeout(() => s.classList.add('visible'), i * 20); }
                });
            };
            const rel = getSmartRecommendations(b, allBooks);
            if (rel.length > 0) {
                const rCont = paletteDetailView.querySelector('#related-books-container');
                rCont.innerHTML = `<h4>You might also like</h4><div class="related-books-grid">${rel.map(x => `<div class=\"related-book\" data-id=\"${x.id}\"><img src=\"${x.Cover_url}\"></div>`).join('')}</div>`;
                rCont.querySelectorAll('.related-book').forEach(el => el.onclick = () => renderPaletteDetail(allBooks.find(x => x.id == el.dataset.id)));
            }
        }
        
        // Top anchors functionality
        const footerBackToTop = document.getElementById('footer-back-to-top');
        if (footerBackToTop) {
            footerBackToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
        
    });
  </script>
</body>
</html>
